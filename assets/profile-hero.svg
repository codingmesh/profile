<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CodingMesh GitHub profile banner</title>
  <desc id="desc">A dark GitHub-native profile banner for CodingMesh, focused on AI application engineering, agents, retrieval systems, and product delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1117"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#08131F"/>
    </linearGradient>
    <linearGradient id="accentFade" x1="741" y1="58" x2="1120" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0.04"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#94A3B8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="30" fill="url(#grid)"/>
  <path d="M0 318C151 279 287 295 420 258C583 213 705 105 902 96C1044 90 1143 142 1200 181V420H0V318Z" fill="#2DD4BF" fill-opacity="0.08"/>
  <path d="M52 52H1148V368H52V52Z" stroke="#F8FAFC" stroke-opacity="0.08"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="78" y="104" fill="#2DD4BF" font-size="18" font-weight="750" letter-spacing="4">CODINGMESH</text>
    <text x="76" y="180" fill="#F8FAFC" font-size="60" font-weight="850" letter-spacing="0">AI application</text>
    <text x="76" y="244" fill="#F8FAFC" font-size="60" font-weight="850" letter-spacing="0">engineering</text>
    <text x="80" y="294" fill="#CBD5E1" font-size="24" font-weight="520">Agents, retrieval systems, and full-stack product delivery.</text>
  </g>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="16" font-weight="650">
    <rect x="80" y="326" width="112" height="36" rx="18" fill="#2DD4BF" fill-opacity="0.14" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <text x="113" y="349" fill="#DFFCF7">Java</text>
    <rect x="204" y="326" width="154" height="36" rx="18" fill="#2DD4BF" fill-opacity="0.14" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <text x="235" y="349" fill="#DFFCF7">TypeScript</text>
    <rect x="370" y="326" width="124" height="36" rx="18" fill="#2DD4BF" fill-opacity="0.14" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <text x="401" y="349" fill="#DFFCF7">Python</text>
    <rect x="506" y="326" width="142" height="36" rx="18" fill="#2DD4BF" fill-opacity="0.14" stroke="#2DD4BF" stroke-opacity="0.45"/>
    <text x="538" y="349" fill="#DFFCF7">Cloud</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="740" y="66" width="390" height="286" rx="26" fill="#0F172A" fill-opacity="0.82" stroke="#2DD4BF" stroke-opacity="0.34"/>
    <rect x="740" y="66" width="390" height="286" rx="26" fill="url(#accentFade)"/>
    <path d="M784 119H1086" stroke="#2DD4BF" stroke-opacity="0.28"/>
    <circle cx="814" cy="96" r="7" fill="#2DD4BF"/>
    <circle cx="840" cy="96" r="7" fill="#2DD4BF" fill-opacity="0.58"/>
    <circle cx="866" cy="96" r="7" fill="#2DD4BF" fill-opacity="0.28"/>
  </g>

  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="17">
    <text x="784" y="154" fill="#94A3B8">pipeline:</text>
    <text x="814" y="190" fill="#E5E7EB">prompt -> tools</text>
    <text x="814" y="226" fill="#E5E7EB">retrieve -> reason</text>
    <text x="814" y="262" fill="#E5E7EB">evaluate -> ship</text>
  </g>

  <g stroke="#2DD4BF" stroke-opacity="0.55" stroke-width="2">
    <circle cx="998" cy="183" r="12" fill="#0D1117"/>
    <circle cx="1042" cy="232" r="12" fill="#0D1117"/>
    <circle cx="966" cy="268" r="12" fill="#0D1117"/>
    <path d="M1007 191L1033 223"/>
    <path d="M1031 237L978 263"/>
    <path d="M991 186L971 256"/>
  </g>
</svg>
